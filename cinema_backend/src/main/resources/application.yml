server:
  port: 8080

spring:
  application:
    name: cinema-system
  datasource:
    url: jdbc:postgresql://localhost:5432/cinema
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:MySecretKeyForJWTTokenGeneration2026CinemaSystemByTraeIDE}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "
